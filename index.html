<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwkT3pkdpL7PfsIJLFz-iAXj1T_p1IjAlHMBmHMYDwqHEpsEoFR4O5wKuXOXMMKv0MS/exec";
const SPREADSHEET_ID = "1CdOJ_j-yT7MudoCRd4GFL7bBsKs_wK96ipIStAKO7XY";
const SHEET_NAME = "sweeft projects";

const loader = document.getElementById('loader');

function showLoading(show) {
    loader.style.display = show ? 'flex' : 'none';
}

/* ================= FUTURISTIC POPUP ================= */

function showPopup(message, type = "success") {
    const popup = document.createElement("div");
    popup.innerText = message;

    popup.style.position = "fixed";
    popup.style.top = "30px";
    popup.style.right = "30px";
    popup.style.padding = "15px 20px";
    popup.style.borderRadius = "12px";
    popup.style.zIndex = "2000";
    popup.style.fontWeight = "600";
    popup.style.boxShadow = "0 10px 30px rgba(0,0,0,0.5)";
    popup.style.backdropFilter = "blur(10px)";
    popup.style.background = type === "success"
        ? "rgba(34,197,94,0.15)"
        : "rgba(239,68,68,0.15)";
    popup.style.border = type === "success"
        ? "1px solid #22c55e"
        : "1px solid #ef4444";
    popup.style.color = type === "success"
        ? "#22c55e"
        : "#ef4444";
    popup.style.transform = "translateX(120%)";
    popup.style.transition = "0.4s ease";

    document.body.appendChild(popup);

    setTimeout(() => popup.style.transform = "translateX(0)", 50);
    setTimeout(() => {
        popup.style.transform = "translateX(120%)";
        setTimeout(() => popup.remove(), 400);
    }, 4000);
}

/* ================= UPLOAD PROJECT ================= */

document.getElementById("projectForm").addEventListener("submit", async function(e){
    e.preventDefault();
    showLoading(true);

    const payload = {
        action: "add",
        projectName: document.getElementById("projectName").value.trim(),
        department: document.getElementById("department").value.trim(),
        description: document.getElementById("description").value.trim(),
        price: document.getElementById("price").value.trim(),
        fileId: document.getElementById("fileId").value.trim()
    };

    try {
        const response = await fetch(WEBAPP_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if(result.success){
            showPopup("Project Uploaded Successfully ✅ ID: " + result.id, "success");
            document.getElementById("projectForm").reset();
        } else {
            showPopup(result.message || "Upload failed", "error");
        }

    } catch (error) {
        showPopup("Network Error: " + error.message, "error");
    }

    showLoading(false);
});

/* ================= DELETE PROJECT ================= */

async function deleteProject(){
    const id = document.getElementById("deleteId").value.trim();
    if(!id){
        showPopup("Enter Project ID", "error");
        return;
    }

    showLoading(true);

    try {
        const response = await fetch(WEBAPP_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "delete",
                id: id
            })
        });

        const result = await response.json();

        if(result.success){
            showPopup("Project Deleted Successfully ✅", "success");
            document.getElementById("deleteId").value = "";
        } else {
            showPopup(result.message || "Delete failed", "error");
        }

    } catch (error) {
        showPopup("Network Error: " + error.message, "error");
    }

    showLoading(false);
}

/* ================= LOAD PROJECTS ================= */

async function loadProjects() {
    showLoading(true);
    toggleView('list');

    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

    try {
        const resp = await fetch(url);
        const text = await resp.text();
        const json = JSON.parse(text.substr(47).slice(0, -2));
        const rows = json.table.rows;

        let html = "";
        rows.forEach(row => {
            html += `<tr>
                <td>${row.c[0]?.v || ''}</td>
                <td>${row.c[1]?.v || ''}</td>
                <td>${row.c[2]?.v || ''}</td>
                <td>$${row.c[4]?.v || ''}</td>
                <td><span style="color:var(--success)">${row.c[7]?.v || ''}</span></td>
            </tr>`;
        });

        document.getElementById("projectTableBody").innerHTML = html;

    } catch (e) {
        showPopup("Sheet must be set to 'Anyone with link can view'", "error");
    }

    showLoading(false);
}

function toggleView(view) {
    document.getElementById('formContainer').style.display = view === 'form' ? 'block' : 'none';
    document.getElementById('listContainer').style.display = view === 'list' ? 'block' : 'none';
}
</script>
