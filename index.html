<!DOCTYPE html>
<html>
<head>
  <title>Sweeft's Admin - Project Upload</title>
  <meta charset="UTF-8">
</head>
<body>

<h2>Upload Project</h2>

<form id="projectForm">
  <input type="text" id="projectName" placeholder="Project Name" required><br><br>
 
  <input type="text" id="department" placeholder="Department" required><br><br>
 
  <textarea id="description" placeholder="Small Description" required></textarea><br><br>
 
  <input type="number" id="price" placeholder="Price" required><br><br>
 
  <input type="text" id="fileId" placeholder="Google Drive File ID" required><br><br>
 
  <button type="submit">Post Project</button>
</form>

<hr>

<h2>Delete Project</h2>
<input type="text" id="deleteId" placeholder="Enter Project ID">
<button onclick="deleteProject()">Delete</button>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwkT3pkdpL7PfsIJLFz-iAXj1T_p1IjAlHMBmHMYDwqHEpsEoFR4O5wKuXOXMMKv0MS/exec";

document.getElementById("projectForm").addEventListener("submit", function(e){
  e.preventDefault();

  fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "add",
      projectName: document.getElementById("projectName").value,
      department: document.getElementById("department").value,
      description: document.getElementById("description").value,
      price: document.getElementById("price").value,
      fileId: document.getElementById("fileId").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      alert("Project Posted! ID: " + data.id);
      document.getElementById("projectForm").reset();
    } else {
      alert("Error posting project");
    }
  });
});

function deleteProject(){
  const id = document.getElementById("deleteId").value;

  fetch(WEBAPP_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id: id
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.success){
      alert("Deleted Successfully");
    } else {
      alert("ID not found");
    }
  });
}

</script>

</body>
</html>
