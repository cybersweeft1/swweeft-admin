<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin - Project Management</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Base Styling & Deep Blue Gradient Background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            font-weight: 600;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #38bdf8; /* Light blue accent */
            text-align: center;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, textarea {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Button Styling */
        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: bold;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        #postBtn {
            background: linear-gradient(to right, #0ea5e9, #2563eb);
            color: white;
            margin-top: 10px;
        }

        #deleteBtn {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            width: 100%;
        }

        #deleteBtn:hover {
            background: #ef4444;
            color: white;
        }

        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2rem 0;
        }

        .delete-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

    </style>
</head>
<body>

<div class="admin-container">
    <h2>Upload Project</h2>
    <form id="projectForm">
        <input type="text" id="projectName" placeholder="Project Name" required>
        <input type="text" id="department" placeholder="Department" required>
        <textarea id="description" placeholder="Small Description" required></textarea>
        <input type="number" id="price" placeholder="Price (NGN)" required>
        <input type="text" id="fileId" placeholder="Google Drive File ID" required>
        <button type="submit" id="postBtn">Post Project</button>
    </form>

    <div class="divider"></div>

    <h2>Delete Project</h2>
    <div class="delete-section">
        <input type="text" id="deleteId" placeholder="Enter Project ID">
        <button id="deleteBtn" onclick="deleteProject()">Delete Project</button>
    </div>
</div>

<script>
    const WEBAPP_URL = "YOUR_WEBAPP_URL";

    document.getElementById("projectForm").addEventListener("submit", function(e){
        e.preventDefault();
        const postBtn = document.getElementById("postBtn");
        postBtn.innerText = "Processing...";
        postBtn.disabled = true;

        fetch(WEBAPP_URL, {
            method: "POST",
            body: JSON.stringify({
                action: "add",
                projectName: document.getElementById("projectName").value,
                department: document.getElementById("department").value,
                description: document.getElementById("description").value,
                price: document.getElementById("price").value,
                fileId: document.getElementById("fileId").value
            })
        })
        .then(res => res.json())
        .then(data => {
            if(data.success){
                alert("Project Posted! ID: " + data.id);
                document.getElementById("projectForm").reset();
            } else {
                alert("Error posting project");
            }
        })
        .finally(() => {
            postBtn.innerText = "Post Project";
            postBtn.disabled = false;
        });
    });

    function deleteProject(){
        const id = document.getElementById("deleteId").value;
        if(!id) return alert("Please enter an ID");

        if(confirm("Are you sure you want to delete this project?")){
            fetch(WEBAPP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "delete",
                    id: id
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success){
                    alert("Deleted Successfully");
                    document.getElementById("deleteId").value = "";
                } else {
                    alert("ID not found");
                }
            });
        }
    }
</script>

</body>
</html>
